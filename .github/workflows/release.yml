name: Release

# Push tag v* → creates a GitHub Release and deploys core + starter to Maven Central
# (Central Portal autoPublish=true — no manual Publish step)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Release `${{ github.ref_name }}`.

            Deploying `spring-validation-plus-core` and
            `spring-validation-plus-spring-boot-starter` to Maven Central
            (`autoPublish=true`).

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --import

      - name: Configure Maven Central credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
              <servers>
                  <server>
                      <id>central</id>
                      <username>${CENTRAL_USERNAME}</username>
                      <password>${CENTRAL_PASSWORD}</password>
                  </server>
              </servers>
              <profiles>
                  <profile>
                      <id>release</id>
                      <properties>
                          <gpg.keyname>${GPG_KEY_ID}</gpg.keyname>
                          <gpg.passphrase>${GPG_PASSPHRASE}</gpg.passphrase>
                      </properties>
                  </profile>
              </profiles>
              <activeProfiles>
                  <activeProfile>release</activeProfile>
              </activeProfiles>
          </settings>
          EOF
          chmod 600 ~/.m2/settings.xml
          # Strip YAML indentation from the generated XML
          sed -i 's/^          //' ~/.m2/settings.xml

      - name: Verify release version
        run: |
          VERSION="$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)"
          if echo "$VERSION" | grep -q 'SNAPSHOT$'; then
            echo "Refusing to deploy SNAPSHOT version: $VERSION" >&2
            exit 1
          fi
          echo "Deploying version: $VERSION (tag ${{ github.ref_name }})"

      - name: Deploy to Maven Central
        run: |
          mvn clean deploy -Prelease -B \
            -pl spring-validation-plus-core,spring-validation-plus-spring-boot-starter \
            -am
