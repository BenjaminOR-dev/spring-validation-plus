name: Release

# 1) Push tag v*     → creates a GitHub Release in draft
# 2) Publish release → deploys core + starter to Maven Central
#    (Central Portal autoPublish=true — no manual Publish in Sonatype)
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  draft-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          body: |
            Draft release for `${{ github.ref_name }}`.

            **Next steps**
            1. Review the notes and the tagged commit (POMs must be a non-SNAPSHOT version).
            2. Click **Publish release** to deploy `spring-validation-plus-core` and
               `spring-validation-plus-spring-boot-starter` to Maven Central.
            3. With `autoPublish=true`, Central Portal publishes after a successful upload
               (no manual Publish in [Central Portal](https://central.sonatype.com/)).

  publish-maven:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --import

      - name: Configure Maven Central credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
              <servers>
                  <server>
                      <id>central</id>
                      <username>${CENTRAL_USERNAME}</username>
                      <password>${CENTRAL_PASSWORD}</password>
                  </server>
              </servers>
              <profiles>
                  <profile>
                      <id>release</id>
                      <properties>
                          <gpg.keyname>${GPG_KEY_ID}</gpg.keyname>
                          <gpg.passphrase>${GPG_PASSPHRASE}</gpg.passphrase>
                      </properties>
                  </profile>
              </profiles>
              <activeProfiles>
                  <activeProfile>release</activeProfile>
              </activeProfiles>
          </settings>
          EOF
          chmod 600 ~/.m2/settings.xml
          # Strip YAML indentation from the generated XML
          sed -i 's/^          //' ~/.m2/settings.xml

      - name: Verify release version
        run: |
          VERSION="$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)"
          if echo "$VERSION" | grep -q 'SNAPSHOT$'; then
            echo "Refusing to deploy SNAPSHOT version: $VERSION" >&2
            exit 1
          fi
          echo "Deploying version: $VERSION (tag ${{ github.event.release.tag_name }})"

      - name: Deploy to Maven Central
        run: |
          mvn clean deploy -Prelease -B \
            -pl spring-validation-plus-core,spring-validation-plus-spring-boot-starter \
            -am
