server.port=8080

# Spring Validation Plus
spring.validation-plus.enabled=true
spring.validation-plus.exception-handler.enabled=true

# i18n — mensajes en español por defecto
spring.web.locale=es
spring.web.locale-resolver=accept_header

# H2 en memoria (solo para demostrar @Unique / @Exists)
spring.datasource.url=jdbc:h2:mem:validation-plus-example;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
